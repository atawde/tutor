<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor 24 X 7</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-slate-50">

    <!-- Header -->
    <header class="fixed top-0 left-0 w-full h-16 bg-indigo-700 text-white shadow-md flex items-center px-6 z-50">

        <!-- Logo -->
        <div class="w-1/4">
            <img src="/static/images/logo.png"
                 alt="Logo"
                 class="h-10">
        </div>

        <!-- Title -->
        <div class="w-2/4 text-center">
            <h1 class="text-3xl font-bold tracking-wide">
                Tutor 24 X 7
            </h1>
        </div>

        <!-- Empty space -->
        <div class="w-1/4"></div>

    </header>


    <!-- Main Content -->
    <main class="main-content">
    <br><br><br>
    <div class="landing_card">

        <h2 class="text-2xl font-semibold text-slate-700 mb-8">
            Welcome
        </h2>

        <div class="space-y-5">

            <button
                onclick="window.location.href='/login'"
                class="w-64 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg text-lg font-semibold transition">
                Admin Login
            </button>

            <button
                onclick="window.location.href='/login'"
                class="w-64 bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg text-lg font-semibold transition">
                Student Login
            </button>

        </div>

    </div>

    </main>

    <!-- Footer -->
    <footer class="fixed bottom-0 left-0 w-full h-12 bg-indigo-700 text-white flex justify-center items-center">

        © 2026 Tutor 24 X 7. All Rights Reserved.

    </footer>

</body>
</html>
